name = "la-mayor-results-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"

[observability]
enabled = true

# KV snapshot history is optional — worker runs without it.
# To enable persistent history, create a KV namespace in Cloudflare and uncomment:
# [[kv_namespaces]]
# binding = "SNAPSHOTS"
# id      = "YOUR_KV_NAMESPACE_ID"
